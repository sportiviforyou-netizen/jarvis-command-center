<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Garvis" />
  <meta name="theme-color" content="#111827" />
  <link rel="manifest" href="manifest.json" />
  <title>Garvis Command Center</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <main class="app">

    <section class="hero">
      <div class="brand-row">
        <div class="logo">G</div>
        <div>
          <h1>Garvis</h1>
          <p>Private AI Commander</p>
        </div>
      </div>

      <div class="intro">
        <strong>שלום מוטי,<br>אני ג׳רביס.</strong>
        <span>
          כתוב לי מה אתה רוצה לבצע. אני אנתח את המשימה, אבחר לבד את הדרך המתאימה, ואחזיר לך פעולה מסודרת.
        </span>
      </div>
    </section>

    <section class="card">
      <label for="command">מה לבצע?</label>

      <textarea
        id="command"
        rows="8"
        placeholder="לדוגמה: ג׳רביס, תפתח לי את ynet&#10;או: ג׳רביס, תבנה לי דף נחיתה למוצר כושר&#10;או: ג׳רביס, תכין לי פרומפט לקודקס"
      ></textarea>

      <button id="sendBtn">שלח לג׳רביס</button>
    </section>

    <section id="resultCard" class="card result hidden">
      <div class="result-header">
        <h2>תשובת ג׳רביס</h2>
        <button id="copyBtn" class="secondary">העתק</button>
      </div>

      <div id="result"></div>

      <div class="actions">
        <button id="clearBtn" class="secondary">נקה</button>
      </div>
    </section>

    <section class="footer-note">
      גרסת תקשורת ישירה. ג׳רביס מחליט לבד איך לטפל בפקודה.
    </section>

  </main>

  <script src="app.js"></script>
</body>
</html>
