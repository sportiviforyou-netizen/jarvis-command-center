<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>GARVIS Voice — ממשק קולי</title>
  <style>
    :root {
      --cyan:    #00d4ff;
      --blue:    #0050c8;
      --purple:  #7b2fff;
      --bg:      #020c1b;
      --surface: rgba(0,212,255,0.05);
      --border:  rgba(0,212,255,0.18);
      --text:    #c8f0ff;
      --muted:   rgba(200,240,255,0.45);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* scanline overlay */
    body::before {
      content: '';
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(0,212,255,0.015) 2px, rgba(0,212,255,0.015) 4px
      );
    }

    .app { width: 100%; max-width: 480px; padding: 20px 16px 40px; position: relative; z-index: 1; }

    /* header */
    .top-bar {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 28px;
    }
    .back-btn {
      background: none; border: 1px solid var(--border); border-radius: 8px;
      color: var(--cyan); font-size: 13px; padding: 6px 12px; cursor: pointer;
      text-decoration: none;
    }
    .back-btn:hover { background: var(--surface); }
    .page-title { font-size: 18px; font-weight: 700; letter-spacing: 2px; color: var(--cyan); }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--cyan); box-shadow: 0 0 8px var(--cyan);
      animation: pulse-dot 2s ease-in-out infinite;
    }
    @keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:0.3} }

    /* mic section */
    .mic-section {
      display: flex; flex-direction: column; align-items: center; gap: 20px;
      margin: 24px 0;
    }

    .mic-ring {
      position: relative; width: 180px; height: 180px;
      display: flex; align-items: center; justify-content: center;
    }
    .mic-ring::before, .mic-ring::after {
      content: '';
      position: absolute; inset: 0; border-radius: 50%;
      border: 1px solid var(--cyan); opacity: 0.25;
      animation: ring-spin 8s linear infinite;
    }
    .mic-ring::after { inset: 10px; animation-direction: reverse; animation-duration: 5s; }
    @keyframes ring-spin { to { transform: rotate(360deg); } }

    #micBtn {
      width: 120px; height: 120px; border-radius: 50%;
      border: 2px solid var(--cyan);
      background: radial-gradient(circle at 35% 35%, rgba(0,212,255,0.25), rgba(0,10,40,0.9));
      color: white; font-size: 44px; cursor: pointer;
      box-shadow: 0 0 24px rgba(0,212,255,0.35), inset 0 0 20px rgba(0,212,255,0.08);
      transition: all 0.2s ease;
      display: flex; align-items: center; justify-content: center;
      -webkit-user-select: none; user-select: none;
      position: relative; z-index: 2;
    }
    #micBtn:hover { box-shadow: 0 0 36px rgba(0,212,255,0.55); }
    #micBtn.recording {
      border-color: #ff3b5c;
      background: radial-gradient(circle at 35% 35%, rgba(255,59,92,0.35), rgba(40,0,10,0.9));
      box-shadow: 0 0 40px rgba(255,59,92,0.6), inset 0 0 20px rgba(255,59,92,0.1);
      animation: mic-pulse 0.8s ease-in-out infinite alternate;
    }
    @keyframes mic-pulse { from { transform: scale(1); } to { transform: scale(1.06); } }
    #micBtn.processing {
      border-color: var(--purple);
      animation: mic-spin 1s linear infinite;
    }
    @keyframes mic-spin { to { transform: rotate(360deg); } }

    .mic-hint {
      font-size: 14px; color: var(--muted); text-align: center; line-height: 1.5;
      min-height: 40px;
    }
    .mic-hint b { color: var(--cyan); }

    /* transcript */
    .card {
      background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
      padding: 16px; margin-bottom: 14px;
    }
    .card-label {
      font-size: 11px; font-weight: 700; letter-spacing: 1.5px; color: var(--muted);
      margin-bottom: 10px; text-transform: uppercase;
    }
    .transcript-text, .response-text {
      font-size: 15px; line-height: 1.7; color: var(--text);
      white-space: pre-wrap; word-break: break-word; min-height: 48px;
    }
    .response-text { color: #80f0ff; }
    .placeholder { color: var(--muted); font-style: italic; }

    /* play button */
    #playBtn {
      display: none; margin-top: 12px; width: 100%;
      background: none; border: 1px solid var(--border); border-radius: 8px;
      color: var(--cyan); font-size: 14px; padding: 9px; cursor: pointer;
    }
    #playBtn:hover { background: var(--surface); }

    /* audio visualizer */
    #vizCanvas {
      width: 100%; height: 48px; border-radius: 8px;
      background: rgba(0,212,255,0.04); display: none;
    }

    /* history */
    .history-wrap { margin-top: 20px; }
    .history-title { font-size: 12px; letter-spacing: 1px; color: var(--muted); margin-bottom: 10px; }
    .history-item {
      background: var(--surface); border-radius: 8px; padding: 10px 14px;
      margin-bottom: 8px; font-size: 13px; border: 1px solid transparent;
      cursor: pointer; transition: border-color 0.15s;
    }
    .history-item:hover { border-color: var(--border); }
    .history-item .q { color: var(--muted); margin-bottom: 4px; font-size: 12px; }
    .history-item .a { color: #80f0ff; }

    /* loading bar */
    .loading-bar {
      height: 2px; background: linear-gradient(90deg, var(--cyan), var(--purple));
      border-radius: 1px; display: none;
      animation: loading-sweep 1.2s ease-in-out infinite;
    }
    @keyframes loading-sweep {
      0%   { transform: scaleX(0); transform-origin: left; }
      50%  { transform: scaleX(1); transform-origin: left; }
      51%  { transform: scaleX(1); transform-origin: right; }
      100% { transform: scaleX(0); transform-origin: right; }
    }

    footer { margin-top: 32px; font-size: 11px; color: var(--muted); text-align: center; }
  </style>
</head>
<body>

<div class="app">

  <!-- top bar -->
  <div class="top-bar">
    <a class="back-btn" href="/">← GARVIS</a>
    <span class="page-title">🎙 VOICE</span>
    <div class="status-dot"></div>
  </div>

  <!-- mic -->
  <div class="mic-section">
    <div class="mic-ring">
      <button id="micBtn" title="לחץ והחזק לדיבור">🎤</button>
    </div>
    <canvas id="vizCanvas" width="400" height="48"></canvas>
    <p class="mic-hint" id="micHint">
      <b>לחץ והחזק</b> את הכפתור ודבר.<br>שחרר כשסיימת.
    </p>
  </div>

  <!-- transcript -->
  <div class="card">
    <div class="card-label">מה שאמרת</div>
    <div class="transcript-text" id="transcriptEl">
      <span class="placeholder">הטקסט שלך יופיע כאן...</span>
    </div>
  </div>

  <!-- loading bar -->
  <div class="loading-bar" id="loadingBar"></div>

  <!-- response -->
  <div class="card">
    <div class="card-label">תשובת GARVIS</div>
    <div class="response-text" id="responseEl">
      <span class="placeholder">התשובה תופיע כאן...</span>
    </div>
    <button id="playBtn">🔊 השמע תשובה קולית</button>
  </div>

  <!-- history -->
  <div class="history-wrap">
    <div class="history-title">היסטוריה</div>
    <div id="historyList"></div>
  </div>

  <footer>GARVIS Voice · OpenAI Whisper + GPT-4.1 + TTS Nova</footer>
</div>

<script>
/* ── config ─────────────────────────────────── */
const API_BASE   = "https://jarvis-command-center-1-0.onrender.com";
const STT_URL    = `${API_BASE}/voice-transcribe`;
const TTS_URL    = `${API_BASE}/voice-tts`;
const CMD_URL    = `${API_BASE}/command-stream`;

/* ── DOM ─────────────────────────────────────── */
const micBtn      = document.getElementById("micBtn");
const micHint     = document.getElementById("micHint");
const transcriptEl= document.getElementById("transcriptEl");
const responseEl  = document.getElementById("responseEl");
const playBtn     = document.getElementById("playBtn");
const loadingBar  = document.getElementById("loadingBar");
const historyList = document.getElementById("historyList");
const vizCanvas   = document.getElementById("vizCanvas");
const vizCtx      = vizCanvas.getContext("2d");

/* ── state ───────────────────────────────────── */
let mediaRecorder = null;
let audioChunks   = [];
let isRecording   = false;
let lastResponse  = "";
let history       = JSON.parse(localStorage.getItem("garvis_voice_history") || "[]");
let audioCtx      = null;
let analyser      = null;
let vizRaf        = null;

renderHistory();

/* ── mic button ──────────────────────────────── */
micBtn.addEventListener("mousedown",  startRecording);
micBtn.addEventListener("touchstart", e => { e.preventDefault(); startRecording(); }, { passive: false });
micBtn.addEventListener("mouseup",    stopRecording);
micBtn.addEventListener("touchend",   e => { e.preventDefault(); stopRecording(); }, { passive: false });
micBtn.addEventListener("mouseleave", () => { if (isRecording) stopRecording(); });

async function startRecording() {
  if (isRecording) return;
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    isRecording   = true;
    audioChunks   = [];
    mediaRecorder = new MediaRecorder(stream, { mimeType: preferredMime() });
    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
    mediaRecorder.start(100);

    micBtn.classList.add("recording");
    micBtn.textContent = "⏹";
    micHint.innerHTML  = "<b>מקליט...</b> שחרר כשסיימת";

    // visualizer
    startViz(stream);
  } catch (err) {
    setHint(`שגיאת מיקרופון: ${err.message}`);
  }
}

function stopRecording() {
  if (!isRecording || !mediaRecorder) return;
  isRecording = false;
  mediaRecorder.stop();
  mediaRecorder.stream.getTracks().forEach(t => t.stop());
  stopViz();

  micBtn.classList.remove("recording");
  micBtn.classList.add("processing");
  micBtn.textContent = "⚙";
  micHint.innerHTML  = "מעבד...";

  mediaRecorder.onstop = async () => {
    const mime  = preferredMime();
    const blob  = new Blob(audioChunks, { type: mime });
    if (blob.size < 1000) {
      resetMic("הקלטה קצרה מדי. נסה שוב.");
      return;
    }
    await transcribeAndAsk(blob, mime);
  };
}

async function transcribeAndAsk(blob, mime) {
  // STT
  setHint("ממיר דיבור לטקסט...");
  try {
    const form = new FormData();
    form.append("audio", blob, `recording.${ext(mime)}`);
    const r    = await fetch(STT_URL, { method: "POST", body: form });
    const data = await r.json();
    if (!r.ok || data.error) throw new Error(data.error || "STT failed");

    const text = data.text.trim();
    if (!text) { resetMic("לא זוהה דיבור. נסה שוב."); return; }

    transcriptEl.textContent = text;
    resetMic("שלח שאלה חדשה עם לחיצה והחזקה");
    await askGarvis(text);
  } catch (err) {
    resetMic(`שגיאה: ${err.message}`);
    micBtn.classList.remove("processing");
    micBtn.textContent = "🎤";
  }
}

/* ── GARVIS stream ───────────────────────────── */
async function askGarvis(command) {
  responseEl.innerHTML = '<span class="placeholder">ג׳רביס חושב...</span>';
  playBtn.style.display = "none";
  lastResponse = "";
  loadingBar.style.display = "block";

  try {
    const res = await fetch(CMD_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ command }),
    });

    if (!res.ok || !res.body) throw new Error(`HTTP ${res.status}`);

    responseEl.textContent = "";
    const reader  = res.body.getReader();
    const decoder = new TextDecoder();
    let buf = "";

    outer: while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      const lines = buf.split("\n");
      buf = lines.pop();
      for (const line of lines) {
        if (!line.startsWith("data: ")) continue;
        let msg;
        try { msg = JSON.parse(line.slice(6)); } catch { continue; }
        if (msg.text) {
          lastResponse += msg.text;
          responseEl.textContent = lastResponse;
        }
        if (msg.error) { responseEl.textContent = "שגיאה: " + msg.error; break outer; }
        if (msg.done) break outer;
      }
    }

    if (lastResponse) {
      playBtn.style.display = "block";
      saveHistory(command, lastResponse);
    }
  } catch (err) {
    responseEl.textContent = "שגיאה בחיבור: " + err.message;
  } finally {
    loadingBar.style.display = "none";
  }
}

/* ── TTS playback ────────────────────────────── */
playBtn.addEventListener("click", async () => {
  if (!lastResponse) return;
  playBtn.disabled = true;
  playBtn.textContent = "⏳ מייצר אודיו...";
  try {
    const r = await fetch(TTS_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ text: lastResponse.slice(0, 4000) }),
    });
    if (!r.ok) throw new Error(`TTS error ${r.status}`);
    const blob = await r.blob();
    const url  = URL.createObjectURL(blob);
    const audio = new Audio(url);
    audio.play();
    audio.onended = () => {
      playBtn.disabled    = false;
      playBtn.textContent = "🔊 השמע תשובה קולית";
      URL.revokeObjectURL(url);
    };
    playBtn.textContent = "▶ מנגן...";
  } catch (err) {
    playBtn.disabled    = false;
    playBtn.textContent = "⚠ שגיאת TTS";
    console.error(err);
  }
});

/* ── history ─────────────────────────────────── */
function saveHistory(q, a) {
  history.unshift({ q: q.slice(0, 120), a: a.slice(0, 300) });
  if (history.length > 12) history.pop();
  localStorage.setItem("garvis_voice_history", JSON.stringify(history));
  renderHistory();
}

function renderHistory() {
  historyList.innerHTML = "";
  history.slice(0, 5).forEach(item => {
    const el = document.createElement("div");
    el.className = "history-item";
    el.innerHTML = `<div class="q">❓ ${item.q}</div><div class="a">💬 ${item.a}</div>`;
    el.onclick = () => {
      transcriptEl.textContent = item.q;
      askGarvis(item.q);
    };
    historyList.appendChild(el);
  });
}

/* ── audio visualizer ────────────────────────── */
function startViz(stream) {
  vizCanvas.style.display = "block";
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 64;
  audioCtx.createMediaStreamSource(stream).connect(analyser);
  drawViz();
}
function stopViz() {
  vizCanvas.style.display = "none";
  if (vizRaf) cancelAnimationFrame(vizRaf);
  if (audioCtx) { audioCtx.close(); audioCtx = null; }
}
function drawViz() {
  const data = new Uint8Array(analyser.frequencyBinCount);
  analyser.getByteFrequencyData(data);
  const W = vizCanvas.width, H = vizCanvas.height;
  vizCtx.clearRect(0, 0, W, H);
  const bw = W / data.length;
  data.forEach((v, i) => {
    const h = (v / 255) * H;
    const alpha = 0.4 + (v / 255) * 0.6;
    vizCtx.fillStyle = `rgba(0,212,255,${alpha})`;
    vizCtx.fillRect(i * bw, H - h, bw - 1, h);
  });
  vizRaf = requestAnimationFrame(drawViz);
}

/* ── helpers ─────────────────────────────────── */
function preferredMime() {
  const types = ["audio/webm;codecs=opus", "audio/webm", "audio/ogg;codecs=opus", "audio/mp4"];
  return types.find(t => MediaRecorder.isTypeSupported(t)) || "audio/webm";
}
function ext(mime) {
  if (mime.includes("ogg")) return "ogg";
  if (mime.includes("mp4")) return "mp4";
  return "webm";
}
function resetMic(hint) {
  micBtn.classList.remove("recording", "processing");
  micBtn.textContent = "🎤";
  setHint(hint || 'לחץ והחזק ודבר');
}
function setHint(msg) {
  micHint.innerHTML = msg;
}
</script>
</body>
</html>
