name: Deploy Sportivi Dashboard + GARVIS

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy-garvis:
    runs-on: ubuntu-latest
    name: Trigger Render redeploy
    steps:
      - name: Trigger Render deploy hook
        continue-on-error: true
        env:
          RENDER_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -n "$RENDER_HOOK" ]; then
            curl -s -X POST "$RENDER_HOOK" \
              | python3 -c "import sys,json; d=json.load(sys.stdin); print('Deploy triggered:', d.get('id','ok'))" \
              || echo "Deploy hook called"
          else
            echo "No RENDER_DEPLOY_HOOK secret set — skipping"
          fi

  build-and-deploy:
    needs: deploy-garvis
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: sportivi-dashboard/package-lock.json

      - name: Install dependencies
        working-directory: sportivi-dashboard
        run: npm ci

      - name: Build
        working-directory: sportivi-dashboard
        env:
          VITE_GITHUB_TOKEN:        ${{ secrets.VITE_GITHUB_TOKEN }}
          VITE_GITHUB_VAULT_REPO:   sportiviforyou-netizen/jarvis-vault
          VITE_TELEGRAM_TOKEN:      ${{ secrets.VITE_TELEGRAM_TOKEN }}
          VITE_TELEGRAM_CHANNEL:    ${{ secrets.VITE_TELEGRAM_CHANNEL }}
          VITE_AE_APP_KEY:          ${{ secrets.VITE_AE_APP_KEY }}
          VITE_AE_APP_SECRET:       ${{ secrets.VITE_AE_APP_SECRET }}
          VITE_REFRESH_KPI:         60000
          VITE_REFRESH_VAULT:       600000
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: sportivi-dashboard/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
