services:
  - type: web
    name: jarvis-command-center-1-0
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --workers 1 --timeout 120 app:app
    autoDeploy: true
    envVars:
      - key: OPENAI_MODEL
        value: gpt-4.1-mini
      - key: AE_APP_KEY
        sync: false
      - key: AE_APP_SECRET
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: GITHUB_REPO
        value: sportiviforyou-netizen/jarvis-affiliate
      - key: AFFILIATE_WF_ID
        value: "273219086"
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHANNEL
        sync: false
      - key: BITLY_TOKEN
        sync: false
      - key: JARVIS_VAULT_REPO
        value: sportiviforyou-netizen/jarvis-vault

